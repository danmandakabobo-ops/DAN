<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ehoud Messagerie | Private Circle</title>
    <style>
        :root {
            --wine-red: #630d0d;
            --gold: #b39359;
            --dark: #121212;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        header { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 1px solid var(--gold); }
        header h1 { font-size: 1.2rem; color: var(--gold); margin: 0; letter-spacing: 2px; }

        /* Zone de messages */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .message { max-width: 70%; padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
        .sent { align-self: flex-end; background: var(--wine-red); color: white; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #2c2c2c; color: #ddd; border-bottom-left-radius: 2px; }
        .username { font-size: 0.7rem; color: var(--gold); display: block; margin-bottom: 4px; font-weight: bold; }

        /* Zone d'écriture */
        .input-area { background: #1a1a1a; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #2c2c2c; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        button { background: var(--gold); border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>EHOUD PRIVATE CIRCLE</h1>
    </header>

    <div id="chat-box">
        <div class="message received">
            <span class="username">Ami 1</span>
            Bienvenue dans notre cercle privé !
        </div>
        <div class="message sent">
            <span class="username">Moi</span>
            C'est superbe, le design est très propre.
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="Écrire un message...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('msgInput');
            const chatBox = document.getElementById('chat-box');
            
            if(input.value.trim() !== "") {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message', 'sent');
                msgDiv.innerHTML = `<span class="username">Moi</span>${input.value}`;
                chatBox.appendChild(msgDiv);
                
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html><!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANDA | Cercle Privé</title>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --black: #050505; --wine: #800000; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Écran de verrouillage */
        #lock-screen {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .manda-logo { font-family: 'Bodoni Moda', serif; font-size: 4rem; color: var(--gold); letter-spacing: 15px; margin-bottom: 20px; }
        .login-card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid rgba(197,160,89,0.2); text-align: center; }
        input { display: block; width: 260px; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 5px; outline: none; }
        input:focus { border-color: var(--gold); }
        .btn { width: 100%; padding: 12px; background: var(--gold); border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: white; }

        /* Interface Chat */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { padding: 15px 25px; background: #0c0c0c; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        header h2 { font-family: 'Bodoni Moda', serif; color: var(--gold); margin: 0; letter-spacing: 4px; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #080808; }
        
        .bubble { max-width: 75%; padding: 12px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: var(--wine); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #222; border-bottom-left-radius: 2px; }
        .user { font-size: 0.7rem; color: var(--gold); font-weight: bold; display: block; margin-bottom: 4px; }

        .input-area { padding: 20px; background: #0c0c0c; display: flex; gap: 10px; }
        #msgInput { flex: 1; margin: 0; border-radius: 25px; padding: 12px 20px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="manda-logo">MANDA</div>
        <div class="login-card">
            <input type="text" id="pseudo" placeholder="VOTRE NOM">
            <input type="password" id="pass" placeholder="CODE D'ACCÈS">
            <button class="btn" onclick="entrer()">ACCÉDER</button>
        </div>
    </div>

    <div id="app">
        <header>
            <h2>MANDA</h2>
            <span id="user-tag" style="font-size: 0.7rem; color: var(--gold);"></span>
        </header>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Écrivez ici...">
            <button class="btn" style="width: 60px; border-radius: 50%;" id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // CONFIGURATION MANDA CONNECTÉE
        const firebaseConfig = {
            apiKey: "AIzaSyCWZL93APQw7o7T7T-j-PBxSpKX8VqmAjI",
            authDomain: "talking-7871a.firebaseapp.com",
            projectId: "talking-7871a",
            storageBucket: "talking-7871a.firebasestorage.app",
            messagingSenderId: "204417936034",
            appId: "1:204417936034:web:8a3d7a54e6a8f582a585fb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesCol = collection(db, "manda_messages");

        window.entrer = () => {
            const pass = document.getElementById('pass').value;
            const pseudo = document.getElementById('pseudo').value;
            
            // MOT DE PASSE : MANDA2026
            if(pass === "MANDA2026" && pseudo !== "") {
                localStorage.setItem('manda_user', pseudo.toUpperCase());
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                document.getElementById('user-tag').innerText = pseudo.toUpperCase();
                startChat();
            } else {
                alert("Accès refusé");
            }
        };

        async function sendMessage() {
            const input = document.getElementById('msgInput');
            if(input.value.trim() !== "") {
                await addDoc(messagesCol, {
                    text: input.value,
                    user: localStorage.getItem('manda_user'),
                    timestamp: serverTimestamp()
                });
                input.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        function startChat() {
            const q = query(messagesCol, orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const box = document.getElementById('messages');
                box.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const isMe = data.user === localStorage.getItem('manda_user');
                    box.innerHTML += `
                        <div class="bubble ${isMe ? 'sent' : 'received'}">
                            <span class="user">${data.user}</span>
                            ${data.text}
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
